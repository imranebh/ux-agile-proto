spring:
  application:
    name: autostop-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/autostop}
    username: ${DB_USERNAME:autostop}
    password: ${DB_PASSWORD:autostop}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:change-this-secret-change-this-secret-change-this-secret}
  expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.security: INFO
