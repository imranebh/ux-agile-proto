services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autostop
      MYSQL_USER: autostop
      MYSQL_PASSWORD: autostop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://mysql:3306/autostop
      DB_USERNAME: autostop
      DB_PASSWORD: autostop
      JWT_SECRET: change-this-secret-change-this-secret-change-this-secret
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
